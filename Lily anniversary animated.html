<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy 4 Months Anniversary 🌸</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --pink-deep: #c2185b;
        --pink-mid: #f48fb1;
        --pink-light: #fce4ec;
        --pink-pale: #fff0f5;
        --cream: #fdf6ee;
        --gold: #d4a843;
        --green: #7cb342;
        --bg-dark: #0d0610;
        --bg-mid: #1a0a2e;
      }

      body {
        background: radial-gradient(
          ellipse at 50% 30%,
          #2d0f3d 0%,
          #0d0610 70%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: "Cormorant Garamond", serif;
      }

      /* Floating particles bg */
      #bg-canvas {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      .scene {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      /* Main flower canvas */
      #flower-canvas {
        display: block;
        filter: drop-shadow(0 0 40px rgba(244, 143, 177, 0.4));
      }

      /* Text section */
      .text-wrap {
        text-align: center;
        margin-top: -10px;
        opacity: 0;
        transform: translateY(30px);
        animation: fadeUp 1.2s ease forwards 3.2s;
      }

      .label {
        font-family: "Cinzel", serif;
        font-size: clamp(11px, 1.8vw, 14px);
        letter-spacing: 0.35em;
        color: var(--pink-mid);
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .title {
        font-family: "Cinzel", serif;
        font-size: clamp(28px, 5vw, 52px);
        font-weight: 600;
        color: #fff;
        line-height: 1.1;
        text-shadow:
          0 0 30px rgba(244, 143, 177, 0.6),
          0 0 60px rgba(244, 143, 177, 0.2);
      }

      .title span {
        color: var(--pink-mid);
      }

      .subtitle {
        margin-top: 14px;
        font-size: clamp(14px, 2vw, 18px);
        font-style: italic;
        color: rgba(252, 200, 218, 0.8);
        letter-spacing: 0.05em;
      }

      .hearts {
        margin-top: 16px;
        font-size: 22px;
        letter-spacing: 6px;
        animation: heartbeat 1.4s ease-in-out infinite;
      }

      /* Border ornament */
      .ornament {
        position: fixed;
        inset: 18px;
        border: 1px solid rgba(244, 143, 177, 0.2);
        pointer-events: none;
        z-index: 2;
      }
      .ornament::before,
      .ornament::after {
        content: "✦";
        position: absolute;
        font-size: 14px;
        color: rgba(244, 143, 177, 0.5);
      }
      .ornament::before {
        top: -8px;
        left: 50%;
        transform: translateX(-50%);
      }
      .ornament::after {
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
      }

      .corner {
        position: fixed;
        font-size: 18px;
        color: rgba(244, 143, 177, 0.4);
        z-index: 2;
      }
      .corner.tl {
        top: 10px;
        left: 24px;
      }
      .corner.tr {
        top: 10px;
        right: 24px;
      }
      .corner.bl {
        bottom: 10px;
        left: 24px;
      }
      .corner.br {
        bottom: 10px;
        right: 24px;
      }

      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes heartbeat {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.18);
        }
      }
    </style>
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <div class="ornament"></div>
    <div class="corner tl">♥</div>
    <div class="corner tr">♥</div>
    <div class="corner bl">♥</div>
    <div class="corner br">♥</div>

    <div class="scene">
      <canvas id="flower-canvas" width="520" height="480"></canvas>

      <div class="text-wrap">
        <div class="label">with all my love</div>
        <div class="title">
          Happy <span>4 Months</span><br />Anniversary Sayang
        </div>
        <div class="subtitle">Will u love me in December as u do in May?</div>
        <div class="hearts">♥ ♥ ♥</div>
      </div>
    </div>

    <script>
      // ══════════════════════════════════════════════
      //  BG CANVAS — floating petals & sparkles
      // ══════════════════════════════════════════════
      const bgC = document.getElementById("bg-canvas");
      const bgX = bgC.getContext("2d");

      function resizeBg() {
        bgC.width = window.innerWidth;
        bgC.height = window.innerHeight;
      }
      resizeBg();
      window.addEventListener("resize", resizeBg);

      const PARTICLES = [];
      for (let i = 0; i < 55; i++) {
        PARTICLES.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 2.5 + 0.5,
          speed: Math.random() * 0.4 + 0.1,
          drift: (Math.random() - 0.5) * 0.3,
          alpha: Math.random() * 0.6 + 0.2,
          twinkle: Math.random() * Math.PI * 2,
          isPetal: Math.random() < 0.3,
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.02,
          size: Math.random() * 7 + 4,
        });
      }

      function drawBg(ts) {
        bgX.clearRect(0, 0, bgC.width, bgC.height);
        for (const p of PARTICLES) {
          p.y -= p.speed;
          p.x += p.drift;
          p.twinkle += 0.04;
          p.rot += p.rotSpeed;
          if (p.y < -20) {
            p.y = bgC.height + 10;
            p.x = Math.random() * bgC.width;
          }
          if (p.x < -20) p.x = bgC.width + 10;
          if (p.x > bgC.width + 20) p.x = -10;

          const a = p.alpha * (0.6 + 0.4 * Math.sin(p.twinkle));

          if (p.isPetal) {
            bgX.save();
            bgX.translate(p.x, p.y);
            bgX.rotate(p.rot);
            bgX.globalAlpha = a * 0.7;
            bgX.beginPath();
            bgX.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
            bgX.fillStyle = "#f48fb1";
            bgX.fill();
            bgX.restore();
          } else {
            bgX.globalAlpha = a;
            bgX.beginPath();
            bgX.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            bgX.fillStyle = "#fff";
            bgX.fill();
          }
        }
        bgX.globalAlpha = 1;
        requestAnimationFrame(drawBg);
      }
      requestAnimationFrame(drawBg);

      // ══════════════════════════════════════════════
      //  FLOWER CANVAS — animated lily
      // ══════════════════════════════════════════════
      const fc = document.getElementById("flower-canvas");
      const ctx = fc.getContext("2d");
      const W = fc.width,
        H = fc.height;
      const CX = W / 2,
        CY = H / 2 - 20;

      let progress = 0; // 0→1 bloom
      let shimmer = 0; // continuous glow
      let startTime = null;

      const BLOOM_DURATION = 2800; // ms to fully bloom
      const PETAL_COLORS = [
        { outer: "#f48fb1", inner: "#fce4ec", vein: "#e57aa0" },
        { outer: "#f06292", inner: "#fce4ec", vein: "#c2185b" },
        { outer: "#f48fb1", inner: "#fce4ec", vein: "#e57aa0" },
        { outer: "#f8bbd0", inner: "#fff8fb", vein: "#f48fb1" },
        { outer: "#f06292", inner: "#fce4ec", vein: "#c2185b" },
        { outer: "#f8bbd0", inner: "#fff8fb", vein: "#f48fb1" },
      ];

      // easing
      function easeOutElastic(x) {
        const c4 = (2 * Math.PI) / 3;
        return x === 0
          ? 0
          : x === 1
            ? 1
            : Math.pow(2, -8 * x) * Math.sin((x * 10 - 0.75) * c4) + 1;
      }
      function easeOutCubic(x) {
        return 1 - Math.pow(1 - x, 3);
      }
      function easeInOutQuad(x) {
        return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2;
      }

      // ── Draw stem ──
      function drawStem(p) {
        const stemH = 200 * p;
        // stem
        ctx.save();
        ctx.strokeStyle = "#388e3c";
        ctx.lineWidth = 5;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(CX, CY + 200);
        ctx.quadraticCurveTo(CX + 8, CY + 100, CX, CY + 200 - stemH);
        ctx.stroke();

        // leaf left
        if (p > 0.3) {
          const lp = Math.min(1, (p - 0.3) / 0.4);
          ctx.fillStyle = "#43a047";
          ctx.beginPath();
          ctx.moveTo(CX - 2, CY + 100);
          ctx.bezierCurveTo(
            CX - 60 * lp,
            CY + 60 * lp,
            CX - 80 * lp,
            CY + 90 * lp,
            CX - 10,
            CY + 120,
          );
          ctx.fill();
        }

        // leaf right
        if (p > 0.45) {
          const lp = Math.min(1, (p - 0.45) / 0.4);
          ctx.fillStyle = "#4caf50";
          ctx.beginPath();
          ctx.moveTo(CX + 2, CY + 55);
          ctx.bezierCurveTo(
            CX + 65 * lp,
            CY + 20 * lp,
            CX + 75 * lp,
            CY + 55 * lp,
            CX + 10,
            CY + 75,
          );
          ctx.fill();
        }
        ctx.restore();
      }

      // ── Draw one petal ──
      function drawPetal(
        cx,
        cy,
        angleDeg,
        length,
        width,
        colorObj,
        p,
        shimmerVal,
      ) {
        const angle = (angleDeg * Math.PI) / 180;
        const dx = Math.sin(angle),
          dy = -Math.cos(angle);
        const px = Math.cos(angle),
          py = Math.sin(angle);

        const L = length * p;
        const steps = 50;

        // Build points
        const left = [],
          right = [];
        for (let i = 0; i <= steps; i++) {
          const s = i / steps;
          const along = s * L;
          const wf =
            Math.sin(Math.PI * s) * Math.pow(s, 0.2) * Math.pow(1 - s, 0.1);
          const w = width * wf * p;
          const bend = 0.15 * L * Math.sin(Math.PI * s);
          const bx = cx + dx * along + px * bend * 0.2;
          const by = cy + dy * along + py * bend * 0.2;
          left.push([bx - px * w, by - py * w]);
          right.push([bx + px * w, by + py * w]);
        }

        if (left.length < 2) return;

        ctx.save();

        // Gradient fill
        const tipX = cx + dx * L,
          tipY = cy + dy * L;
        const grad = ctx.createLinearGradient(cx, cy, tipX, tipY);
        grad.addColorStop(0, colorObj.inner);
        grad.addColorStop(0.3, colorObj.outer);
        grad.addColorStop(0.7, colorObj.outer);
        grad.addColorStop(1, colorObj.inner);

        ctx.beginPath();
        ctx.moveTo(left[0][0], left[0][1]);
        for (const pt of left) ctx.lineTo(pt[0], pt[1]);
        for (let i = right.length - 1; i >= 0; i--)
          ctx.lineTo(right[i][0], right[i][1]);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // Vein (centre line)
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        for (let i = 1; i <= steps; i++) {
          const s = i / steps;
          ctx.lineTo(
            cx + dx * s * L + px * 0.15 * L * Math.sin(Math.PI * s) * 0.2,
            cy + dy * s * L + py * 0.15 * L * Math.sin(Math.PI * s) * 0.2,
          );
        }
        ctx.strokeStyle = colorObj.vein;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.5;
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Spots / freckles
        if (p > 0.5) {
          const sp = Math.min(1, (p - 0.5) / 0.5);
          ctx.fillStyle = "#ad1457";
          for (let k = 0; k < 18; k++) {
            const seed = angleDeg * 31 + k * 137;
            const rs = ((seed * 7919) % 100) / 100;
            const rw = ((seed * 6271) % 100) / 100 - 0.5;
            const rr = ((seed * 5381) % 30) / 10 + 1.5;
            const ss = 0.12 + rs * 0.45;
            const wf =
              Math.sin(Math.PI * ss) *
              Math.pow(ss, 0.2) *
              Math.pow(1 - ss, 0.1);
            const bx =
              cx + dx * ss * L + px * 0.2 * L * Math.sin(Math.PI * ss) * 0.2;
            const by =
              cy + dy * ss * L + py * 0.2 * L * Math.sin(Math.PI * ss) * 0.2;
            const sx = bx + px * width * wf * rw * p;
            const sy = by + py * width * wf * rw * p;
            ctx.globalAlpha = 0.6 * sp;
            ctx.beginPath();
            ctx.ellipse(sx, sy, rr * p, rr * 0.6 * p, angle, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }

        // Shimmer highlight
        if (shimmerVal > 0) {
          const shGrad = ctx.createLinearGradient(cx, cy, tipX, tipY);
          shGrad.addColorStop(0, "rgba(255,255,255,0)");
          shGrad.addColorStop(0.4, `rgba(255,255,255,${shimmerVal * 0.18})`);
          shGrad.addColorStop(1, "rgba(255,255,255,0)");
          ctx.beginPath();
          ctx.moveTo(left[0][0], left[0][1]);
          for (const pt of left) ctx.lineTo(pt[0], pt[1]);
          for (let i = right.length - 1; i >= 0; i--)
            ctx.lineTo(right[i][0], right[i][1]);
          ctx.closePath();
          ctx.fillStyle = shGrad;
          ctx.fill();
        }

        ctx.restore();
      }

      // ── Draw stamens ──
      function drawStamens(p) {
        if (p < 0.6) return;
        const sp = Math.min(1, (p - 0.6) / 0.4);

        ctx.save();
        for (let i = 0; i < 8; i++) {
          const ang = (i / 8) * Math.PI * 2;
          const len = (30 + 8 * Math.sin(i * 1.1)) * sp;
          const ex = CX + Math.cos(ang) * len;
          const ey = CY + Math.sin(ang) * len;

          // filament
          ctx.strokeStyle = "#c5e17a";
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = sp;
          ctx.beginPath();
          ctx.moveTo(CX, CY);
          ctx.lineTo(ex, ey);
          ctx.stroke();

          // anther
          ctx.fillStyle = "#8d3b2b";
          ctx.globalAlpha = sp;
          ctx.beginPath();
          ctx.ellipse(ex, ey, 4 * sp, 2.5 * sp, ang, 0, Math.PI * 2);
          ctx.fill();
        }

        // centre pistil
        ctx.globalAlpha = sp;
        ctx.fillStyle = "#aed581";
        ctx.beginPath();
        ctx.arc(CX, CY - 34 * sp, 5 * sp, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#f0f4c3";
        ctx.beginPath();
        ctx.arc(CX, CY - 34 * sp, 2.5 * sp, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#c5e17a";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.lineTo(CX, CY - 32 * sp);
        ctx.stroke();

        ctx.globalAlpha = 1;
        ctx.restore();
      }

      // ── Draw centre ──
      function drawCentre(p) {
        if (p < 0.5) return;
        const cp = Math.min(1, (p - 0.5) / 0.5);
        const glow = ctx.createRadialGradient(CX, CY, 0, CX, CY, 20 * cp);
        glow.addColorStop(0, "#f9fbe7");
        glow.addColorStop(0.5, "#c5e17a");
        glow.addColorStop(1, "rgba(197,225,122,0)");
        ctx.save();
        ctx.globalAlpha = cp;
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(CX, CY, 20 * cp, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // ── Draw sparkles ──
      function drawSparkles(p, t) {
        if (p < 0.85) return;
        const sp = Math.min(1, (p - 0.85) / 0.15);
        const pos = [
          [-110, CY - 90],
          [115, CY - 85],
          [-85, CY + 40],
          [100, CY + 30],
          [-130, CY - 30],
          [130, CY - 10],
          [5, CY - 140],
          [-60, CY - 130],
        ];
        ctx.save();
        for (const [sx, sy] of pos) {
          const pulse = 0.5 + 0.5 * Math.sin(t * 0.003 + sx);
          ctx.globalAlpha = sp * pulse * 0.9;
          ctx.fillStyle = "#fff9c4";
          ctx.strokeStyle = "#fff9c4";
          ctx.lineWidth = 1;
          const r = 2.5;
          ctx.beginPath();
          ctx.arc(sx, sy, r, 0, Math.PI * 2);
          ctx.fill();
          const arm = 7 * pulse;
          ctx.beginPath();
          ctx.moveTo(sx - arm, sy);
          ctx.lineTo(sx + arm, sy);
          ctx.moveTo(sx, sy - arm);
          ctx.lineTo(sx, sy + arm);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      // ── Main draw loop ──
      function drawFlower(ts) {
        if (!startTime) startTime = ts;
        const elapsed = ts - startTime;

        progress = Math.min(1, elapsed / BLOOM_DURATION);
        const p = easeOutElastic(easeOutCubic(progress));
        shimmer = 0.5 + 0.5 * Math.sin(ts * 0.0015);

        ctx.clearRect(0, 0, W, H);

        // stem (blooms first)
        const stemP = Math.min(1, progress * 3);
        drawStem(easeOutCubic(stemP));

        // petals stagger: bottom 3 first, then top 3
        const petalAngles = [0, 120, 240, 60, 180, 300];
        for (let i = 0; i < 6; i++) {
          const delay = i < 3 ? 0.25 : 0.45;
          const pp = Math.max(0, Math.min(1, (progress - delay) / (1 - delay)));
          const pe = easeOutElastic(easeOutCubic(pp));
          const col = PETAL_COLORS[i];
          drawPetal(CX, CY, petalAngles[i], 108, 44, col, pe, shimmer);
        }

        drawCentre(p);
        drawStamens(p);
        drawSparkles(p, ts);

        requestAnimationFrame(drawFlower);
      }

      requestAnimationFrame(drawFlower);
    </script>
  </body>
</html>
